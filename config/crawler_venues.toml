version = 1

# Edit this file to control which venue crawlers run.
# - Set `enabled = false` to disable a venue (or comment out the whole venue block).
# - Use `batch_id` to group venues for staggered cron runs.
# - `use_base_url = true` means this crawler can load remote raw HTML from RAWHTML_BASE_URL.

[[venues]]
venue = "met"
state = "NY"
enabled = true
parser_script_name = "scripts/run_met_parser.py"
batch_id = "batch_a"
use_base_url = true
local_cache_glob = "data/rawhtml/met/*.html"
args = ["--commit"]

